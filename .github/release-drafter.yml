name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 Features"
    labels:
      - "enhancement"
      - "fuse"
      - "ofx"
  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
  - title: "📦 Dependencies"
    labels:
      - "dependencies"
  - title: "📝 Documentation"
    labels:
      - "docs"
      - "documentation"
  - title: "🔧 CI/CD"
    labels:
      - "ci"

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'
no-changes-template: "- No changes"

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
      - "enhancement"
      - "fuse"
      - "ofx"
  patch:
    labels:
      - "bug"
      - "dependencies"
      - "ci"
  default: patch

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
